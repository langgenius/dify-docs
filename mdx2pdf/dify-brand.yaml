# Brand theme for the downloadable Dify manuals (Quire).
# Values are from the official Dify brand kit. Brand blue is #0033FF (identity-manual
# value); the docs website's web-tuned #0060FF is intentionally not used here.

page:
  size: A4
  margin: "2cm"

colors:
  text: "#333333"      # gray-700: default body text
  heading: "#000000"   # black: max-contrast headings; blue stays reserved as the accent
  link: "#0033FF"      # brand blue
  accent: "#0033FF"    # brand blue: rules, the Info callout bar, the blockquote bar
  muted: "#666666"     # gray-350: captions, the page-description lede, secondary text

typography:
  # Söhne is the brand typeface; Inter then DM Sans are the brand-sanctioned fallbacks.
  # Word renders only the first family and neither output embeds fonts, so the Söhne
  # fonts must be installed on the build machine (the CI runner must have them).
  # Family names are the real ones from the font name tables: the regular weight is
  # "Söhne" (not "Söhne Buch"); heavier weights keep their own family ("Söhne Kräftig").
  bodyFont: "'Söhne', 'Inter', 'DM Sans', sans-serif"
  headingFont: "'Söhne Kräftig', 'Söhne', 'Inter', 'DM Sans', sans-serif"
  monoFont: "'Söhne Mono', 'IBM Plex Mono', 'Fira Code', monospace"
  baseSize: "11pt"
  lineHeight: 1.5

toc:
  title: "Contents"

# Running footer. The left slot is the "note" (a left-aligned snapshot reminder that
# links to the live site); the page number moves to the right. The note is a Paged.js
# running element, so in the PDF the whole line is a clickable link to docs.dify.ai.
footer:
  left: "note"
  center: "none"
  right: "pageNumber"
  note:
    text: "This PDF may be out of date. For the latest, visit docs.dify.ai"
    url: "https://docs.dify.ai"

image:
  maxWidth: "65%"   # screenshots render at 65% of the column so they don't dominate the page
  maxHeight: "80vh" # and never taller than the page

cover:
  logoWidth: "52mm"

brand:
  logo: ../logo/dify-logo.png  # Dify wordmark in the repo's logo/ dir; also the docs site logo (logo.light in docs.json)
  productName: "Documentation" # small blue uppercase kicker above the cover title
