# Brand theme for the Chinese (zh) manuals. Same as dify-brand.yaml except the font
# stack, the TOC heading, and the cover kicker are localized. Keep colors / logo / page
# in sync with dify-brand.yaml.

page:
  size: A4
  margin: "2cm"

colors:
  text: "#333333"
  heading: "#000000"
  link: "#0033FF"
  accent: "#0033FF"
  muted: "#666666"

typography:
  # Latin uses Söhne; Chinese characters fall through to MiSans (the brand CJK font, free)
  # then PingFang SC / Noto Sans SC, and finally Noto Sans CJK SC (what CI installs). The
  # chosen font must be installed on the build machine; otherwise text drops to the next
  # available family in the stack.
  bodyFont: "'Söhne', 'MiSans', 'PingFang SC', 'Noto Sans SC', 'Noto Sans CJK SC', sans-serif"
  headingFont: "'Söhne Kräftig', 'Söhne', 'MiSans', 'PingFang SC', 'Noto Sans SC', 'Noto Sans CJK SC', sans-serif"
  monoFont: "'Söhne Mono', 'IBM Plex Mono', 'Fira Code', monospace"
  baseSize: "11pt"
  lineHeight: 1.5

toc:
  title: "目录"

footer:
  left: "note"
  center: "none"
  right: "pageNumber"
  note:
    text: "本 PDF 可能不是最新版本，最新文档请访问 docs.dify.ai"
    url: "https://docs.dify.ai"

image:
  maxWidth: "65%"
  maxHeight: "80vh"

cover:
  logoWidth: "52mm"

brand:
  logo: ../logo/dify-logo.png
  productName: "文档"
