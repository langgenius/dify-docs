# Brand theme for the Japanese (ja) manuals. Same as dify-brand.yaml except the font
# stack, the TOC heading, and the cover kicker are localized. Keep colors / logo / page
# in sync with dify-brand.yaml.

page:
  size: A4
  margin: "2cm"

colors:
  text: "#333333"
  heading: "#000000"
  link: "#0033FF"
  accent: "#0033FF"
  muted: "#666666"

typography:
  # Latin uses Söhne; Japanese characters fall through to Noto Sans JP (the brand CJK
  # font, free) then Hiragino Sans / Yu Gothic, and finally Noto Sans CJK JP (what CI
  # installs). The chosen font must be installed on the build machine; otherwise text
  # drops to the next available family in the stack.
  bodyFont: "'Söhne', 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif"
  headingFont: "'Söhne Kräftig', 'Söhne', 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif"
  monoFont: "'Söhne Mono', 'IBM Plex Mono', 'Fira Code', monospace"
  baseSize: "11pt"
  lineHeight: 1.5

toc:
  title: "目次"

footer:
  left: "note"
  center: "none"
  right: "pageNumber"
  note:
    text: "この PDF は最新でない場合があります。最新版は docs.dify.ai をご覧ください"
    url: "https://docs.dify.ai"

image:
  maxWidth: "65%"
  maxHeight: "80vh"

cover:
  logoWidth: "52mm"

brand:
  logo: ../logo/dify-logo.png
  productName: "ドキュメント"
