# Shared Quire options for building the Dify manuals, so you don't retype them.
# Run `quire convert` from the repo root; these paths are relative to it.
# Pass it with -c/--config; only the per-manual flags (--manifest, --title, -o)
# stay on the command line. Any flag you do pass overrides the value here.

root: .
theme: mdx2pdf/dify-brand.yaml
baseUrl: https://docs.dify.ai
format: pdf
