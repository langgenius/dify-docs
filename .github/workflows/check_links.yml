name: Check Internal Links

on:
  pull_request:
    paths:
      - 'en/**'
      - 'zh/**'
      - 'ja/**'
      - 'docs.json'

jobs:
  internal-links:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check internal links
        run: python3 tools/check-links.py --internal
